# Production stack for a single host (e.g. a GCP Compute Engine VM): treasury app + Postgres +
# x402.rs facilitator on one private network. Only the treasury app's port is published.
#
# Secrets/addresses come from deploy/.env (see deploy/README.md). Bring up with:
#   docker compose -f deploy/docker-compose.yml up -d --build
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: treasury
      POSTGRES_USER: treasury
      POSTGRES_PASSWORD: ${DB_PASSWORD:-treasury}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U treasury"]
      interval: 5s
      timeout: 3s
      retries: 20

  facilitator:
    image: ghcr.io/x402-rs/x402-facilitator
    restart: unless-stopped
    volumes:
      - ../infra/facilitator/config.json:/app/config.json:ro
    environment:
      FACILITATOR_PRIVATE_KEY: ${FACILITATOR_PRIVATE_KEY}
    # NOT published — only the treasury app (same network) reaches it at facilitator:8080.

  treasury:
    build: ../treasury
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://db:5432/treasury
      DB_USER: treasury
      DB_PASSWORD: ${DB_PASSWORD:-treasury}
      FACILITATOR_URL: http://facilitator:8080
      RPC_URL: https://api.avax-test.network/ext/bc/C/rpc
      CHAIN_ID: "43113"
      NETWORK: avalanche-fuji
      USDC_ADDRESS: ${USDC_ADDRESS:-0x5425890298aed601595a70AB815c96711a31Bc65}
      USDC_DOMAIN_NAME: USD Coin
      USDC_DOMAIN_VERSION: "2"
      X402_ENABLED: "true"
      ERC8004_ENABLED: "true"
      TREASURY_PRIVATE_KEY: ${TREASURY_PRIVATE_KEY}
      IDENTITY_REGISTRY_ADDRESS: ${IDENTITY_REGISTRY_ADDRESS}
      REPUTATION_REGISTRY_ADDRESS: ${REPUTATION_REGISTRY_ADDRESS}
      ADMIN_TOKEN: ${ADMIN_TOKEN}
    ports:
      - "8090:8090"

volumes:
  pgdata: {}
