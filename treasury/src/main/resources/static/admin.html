<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Agent Treasury — Admin</title>
  <style>
    :root {
      --bg:#0d1117; --panel:#161b22; --border:#30363d; --text:#e6edf3; --muted:#8b949e;
      --green:#3fb950; --red:#f85149; --amber:#d29922; --blue:#58a6ff;
    }
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--text);font:14px/1.5 -apple-system,"Segoe UI",Roboto,sans-serif}
    header{padding:18px 24px;border-bottom:1px solid var(--border);display:flex;align-items:baseline;gap:12px}
    header h1{font-size:18px;margin:0}
    header .sub{color:var(--muted);font-size:13px}
    header a{margin-left:auto;color:var(--blue);text-decoration:none}
    .wrap{display:grid;grid-template-columns:380px 1fr;gap:20px;padding:20px 24px}
    .panel{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:16px}
    .panel h2{font-size:13px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin:0 0 14px}
    label{display:block;font-size:12px;color:var(--muted);margin:10px 0 4px}
    input,textarea{width:100%;background:#0d1117;border:1px solid var(--border);border-radius:6px;color:var(--text);padding:7px 9px;font:inherit}
    textarea{resize:vertical;min-height:54px;font-family:ui-monospace,Menlo,monospace;font-size:12px}
    .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    button{cursor:pointer;border:1px solid var(--border);background:#21262d;color:var(--text);border-radius:6px;padding:7px 12px;font:inherit}
    button.primary{background:#238636;border-color:#2ea043}
    button.small{padding:3px 8px;font-size:12px}
    button.danger{color:var(--red)}
    table{width:100%;border-collapse:collapse}
    th{text-align:left;color:var(--muted);font-weight:500;font-size:12px;padding:6px 8px;border-bottom:1px solid var(--border)}
    td{padding:8px;border-bottom:1px solid var(--border);vertical-align:top;font-size:13px}
    .mono{font-family:ui-monospace,Menlo,monospace;font-size:12px}
    .muted{color:var(--muted)}
    .key-banner{display:none;margin:0 24px 8px;padding:12px 16px;border:1px solid var(--green);border-radius:8px;background:rgba(63,185,80,.1)}
    .key-banner code{font-size:14px;color:var(--green);word-break:break-all}
    .warn{margin:0 24px;color:var(--amber);font-size:12px}
    .actions{display:flex;gap:6px;flex-wrap:wrap}
    .formfoot{display:flex;gap:8px;margin-top:14px;align-items:center}
  </style>
</head>
<body>
  <header>
    <h1>Agent Treasury — Admin</h1>
    <span class="sub">add agents · configure spending policies · issue API keys</span>
    <a href="#" onclick="setToken();return false" style="margin-left:auto">set admin token</a>
    <a href="/" style="margin-left:16px">← monitoring dashboard</a>
  </header>

  <div class="key-banner" id="keyBanner">
    New API key (shown once — copy it now, only its hash is stored):<br/>
    <code id="keyValue"></code>
  </div>
  <div class="warn">⚠️ Admin is unauthenticated — local/demo use only.</div>

  <div class="wrap">
    <div class="panel">
      <h2 id="formTitle">Add agent</h2>
      <input type="hidden" id="editId"/>
      <label>Agent ID <span class="muted">(optional on create; fixed when editing)</span></label>
      <input id="f_id" placeholder="auto-generated if blank"/>
      <label>Name</label>
      <input id="f_name" placeholder="Research Bot"/>
      <div class="row2">
        <div><label>Per-tx cap (USDC)</label><input id="f_cap" type="number" step="0.01" value="0.50"/></div>
        <div><label>Daily budget (USDC)</label><input id="f_budget" type="number" step="0.01" value="5.00"/></div>
      </div>
      <div class="row2">
        <div><label>Payments / minute</label><input id="f_velocity" type="number" value="5"/></div>
        <div><label>Min reputation (0-100)</label><input id="f_minrep" type="number" value="60"/></div>
      </div>
      <label>Allowed merchants (one address per line)</label>
      <textarea id="f_merchants" placeholder="0x..."></textarea>
      <label>Allowed assets (one address per line)</label>
      <textarea id="f_assets">0x5425890298aed601595a70AB815c96711a31Bc65</textarea>
      <div class="formfoot">
        <button class="primary" onclick="save()" id="saveBtn">Create agent</button>
        <button onclick="resetForm()">Clear</button>
        <span class="muted" id="formMsg"></span>
      </div>
    </div>

    <div class="panel">
      <h2>Agents</h2>
      <table>
        <thead><tr><th>ID / name</th><th>Per-tx</th><th>Daily</th><th>Vel</th><th>Min rep</th><th>Merchants</th><th></th></tr></thead>
        <tbody id="rows"></tbody>
      </table>
    </div>
  </div>

  <script>
    const USDC = "0x5425890298aed601595a70AB815c96711a31Bc65";
    const usd = a => (Number(a)/1e6).toFixed(2);
    const toAtomic = v => Math.round(parseFloat(v || "0") * 1e6);
    const lines = s => (s || "").split(/[\s,]+/).map(x => x.trim()).filter(Boolean);
    const short = s => s ? s.slice(0,6)+"…"+s.slice(-4) : "";
    let agents = [];

    function getToken(){ return localStorage.getItem("adminToken") || ""; }
    function setToken(){
      const t = prompt("Admin token (leave blank if the server is unprotected):", getToken());
      if (t !== null){ localStorage.setItem("adminToken", t); load(); }
    }
    async function adminFetch(url, opts={}){
      opts.headers = Object.assign({"X-Admin-Token": getToken()}, opts.headers || {});
      let res = await fetch(url, opts);
      if (res.status === 401){
        const t = prompt("Admin token required:");
        if (t !== null){ localStorage.setItem("adminToken", t); opts.headers["X-Admin-Token"] = t; res = await fetch(url, opts); }
      }
      return res;
    }

    function showKey(k){ document.getElementById("keyValue").textContent = k;
      document.getElementById("keyBanner").style.display = "block"; }

    async function load(){
      const res = await adminFetch("/api/admin/agents");
      if (!res.ok){
        document.getElementById("rows").innerHTML =
          '<tr><td colspan="7" class="muted">unauthorized — click “set admin token”.</td></tr>';
        return;
      }
      agents = await res.json();
      document.getElementById("rows").innerHTML = agents.map(a => `
        <tr>
          <td><b>${a.id}</b><br/><span class="muted">${a.name}</span></td>
          <td>$${usd(a.perTxCapAtomic)}</td>
          <td>$${usd(a.dailyBudgetAtomic)}</td>
          <td>${a.velocityPerMinute}/min</td>
          <td>${a.minReputation}</td>
          <td class="mono">${(a.allowedMerchants||[]).map(short).join("<br/>") || "<span class='muted'>none</span>"}</td>
          <td class="actions">
            <button class="small" onclick="edit('${a.id}')">Edit</button>
            <button class="small" onclick="rotate('${a.id}')">Rotate key</button>
            <button class="small danger" onclick="del('${a.id}')">Delete</button>
          </td>
        </tr>`).join("") || '<tr><td colspan="7" class="muted">no agents</td></tr>';
    }

    function body(){
      return {
        id: document.getElementById("f_id").value.trim(),
        name: document.getElementById("f_name").value.trim(),
        perTxCapAtomic: toAtomic(document.getElementById("f_cap").value),
        dailyBudgetAtomic: toAtomic(document.getElementById("f_budget").value),
        velocityPerMinute: parseInt(document.getElementById("f_velocity").value || "0"),
        minReputation: parseInt(document.getElementById("f_minrep").value || "0"),
        allowedMerchants: lines(document.getElementById("f_merchants").value),
        allowedAssets: lines(document.getElementById("f_assets").value),
      };
    }

    async function save(){
      const msg = document.getElementById("formMsg");
      const editId = document.getElementById("editId").value;
      const b = body();
      if (!b.name){ msg.textContent = "name is required"; return; }
      msg.textContent = "saving…";
      try {
        let res;
        if (editId) {
          res = await adminFetch(`/api/admin/agents/${editId}`, {method:"PUT",
            headers:{"Content-Type":"application/json"}, body: JSON.stringify(b)});
        } else {
          res = await adminFetch("/api/admin/agents", {method:"POST",
            headers:{"Content-Type":"application/json"}, body: JSON.stringify(b)});
        }
        if (!res.ok){ msg.textContent = "error: HTTP " + res.status + " " + (await res.text()); return; }
        const out = await res.json();
        if (out.apiKey) showKey(out.apiKey);
        msg.textContent = editId ? "updated." : "created.";
        resetForm(); load();
      } catch(e){ msg.textContent = "error: " + e; }
    }

    function edit(id){
      const a = agents.find(x => x.id === id); if (!a) return;
      document.getElementById("editId").value = a.id;
      document.getElementById("f_id").value = a.id;
      document.getElementById("f_id").disabled = true;
      document.getElementById("f_name").value = a.name;
      document.getElementById("f_cap").value = usd(a.perTxCapAtomic);
      document.getElementById("f_budget").value = usd(a.dailyBudgetAtomic);
      document.getElementById("f_velocity").value = a.velocityPerMinute;
      document.getElementById("f_minrep").value = a.minReputation;
      document.getElementById("f_merchants").value = (a.allowedMerchants||[]).join("\n");
      document.getElementById("f_assets").value = (a.allowedAssets||[]).join("\n");
      document.getElementById("formTitle").textContent = "Edit agent: " + a.id;
      document.getElementById("saveBtn").textContent = "Save changes";
      window.scrollTo(0,0);
    }

    function resetForm(){
      document.getElementById("editId").value = "";
      document.getElementById("f_id").value = ""; document.getElementById("f_id").disabled = false;
      document.getElementById("f_name").value = "";
      document.getElementById("f_cap").value = "0.50"; document.getElementById("f_budget").value = "5.00";
      document.getElementById("f_velocity").value = "5"; document.getElementById("f_minrep").value = "60";
      document.getElementById("f_merchants").value = "";
      document.getElementById("f_assets").value = USDC;
      document.getElementById("formTitle").textContent = "Add agent";
      document.getElementById("saveBtn").textContent = "Create agent";
    }

    async function rotate(id){
      if (!confirm("Rotate the API key for " + id + "? The old key stops working.")) return;
      const res = await adminFetch(`/api/admin/agents/${id}/rotate-key`, {method:"POST"});
      if (res.ok){ showKey((await res.json()).apiKey); } else { alert("rotate failed: " + res.status); }
    }

    async function del(id){
      if (!confirm("Delete agent " + id + "?")) return;
      const res = await adminFetch(`/api/admin/agents/${id}`, {method:"DELETE"});
      if (res.ok || res.status === 204){ load(); return; }
      let msg = "HTTP " + res.status;
      try { const b = await res.json(); msg = b.message || b.error || msg; } catch(e){}
      alert("Delete failed: " + msg);
    }

    resetForm(); load();
  </script>
</body>
</html>
